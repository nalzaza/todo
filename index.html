<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المهام | Task Manager</title>
    <style>
        /* --- استدعاء خط Tajawal-Medium المحلي --- */
        @font-face {
            font-family: 'Tajawal';
            src: url('Tajawal-Medium.ttf') format('truetype');
            font-weight: 500; /* الوزن المتوسط المرفق */
            font-style: normal;
            font-display: swap;
        }

        /* --- المتغيرات ولوحة الألوان --- */
        :root {
            --bg-primary: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #6e6e6e;
            --accent-color: #4a90e2;
            --accent-hover: #357abd;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --success-color: #2ecc71;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.04);
            --radius: 10px;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #3782df;
            --accent-hover: #4a90e2;
            --border-color: #2d3748;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* --- التنسيقات العامة --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* تطبيق خط Tajawal كخط أساسي للتطبيق */
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 500; /* تعيين الوزن الافتراضي للمتوسط */
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            border: 1px solid var(--border-color);
        }

        /* --- الهيدر وأزرار التحكم --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background-color: var(--border-color);
        }

        /* --- نموذج إضافة مهمة --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background-color: var(--bg-card);
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
        }

        .input-group input:focus {
            outline: 2px solid var(--accent-color);
        }

        .btn-add {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        /* --- قائمة المهام --- */
        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border-color);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-text {
            cursor: pointer;
            flex: 1;
            word-break: break-all;
            padding: 0 10px;
            font-size: 1.05rem;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .btn-delete:hover {
            color: var(--danger-hover);
        }

        /* الإحصائيات */
        .footer-stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* التجاوب مع الشاشات الصغيرة جداً */
        @media (max-width: 400px) {
            .app-container {
                padding: 15px;
            }
            header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 id="app-title">إدارة المهام</h1>
            <div class="controls">
                <button class="btn-icon" id="theme-toggle" aria-label="Toggle Theme">🌙</button>
                <button class="btn-icon" id="lang-toggle">EN</button>
            </div>
        </header>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="أضف مهمة جديدة...">
            <button class="btn-add" id="add-btn">إضافة</button>
        </div>

        <ul class="task-list" id="task-list"></ul>

        <div class="footer-stats" id="footer-stats">
            لديك <span id="task-count">0</span> مهام متبقية
        </div>
    </div>

    <script>
        const i18n = {
            ar: { title: "إدارة المهام", placeholder: "أضف مهمة جديدة...", addBtn: "إضافة", stats: "لديك {count} مهام متبقية" },
            en: { title: "Task Manager", placeholder: "Add a new task...", addBtn: "Add", stats: "You have {count} tasks left" }
        };

        const appTitle = document.getElementById('app-title');
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const footerStats = document.getElementById('footer-stats');
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentLang = localStorage.getItem('lang') || 'ar';
        let currentTheme = localStorage.getItem('theme') || 'light';

        function updateUI() {
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            appTitle.textContent = i18n[currentLang].title;
            taskInput.placeholder = i18n[currentLang].placeholder;
            addBtn.textContent = i18n[currentLang].addBtn;
            langToggle.textContent = currentLang === 'ar' ? 'EN' : 'عربي';

            document.documentElement.setAttribute('data-theme', currentTheme);
            themeToggle.textContent = currentTheme === 'light' ? '🌙' : '☀️';

            renderTasks();
            
            localStorage.setItem('lang', currentLang);
            localStorage.setItem('theme', currentTheme);
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                    <button class="btn-delete" onclick="deleteTask(${index})" aria-label="Delete">🗑️</button>
                `;
                taskList.appendChild(li);
            });
            const activeTasksCount = tasks.filter(t => !t.completed).length;
            footerStats.innerHTML = i18n[currentLang].stats.replace('{count}', activeTasksCount);
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;
            tasks.push({ text: text, completed: false });
            taskInput.value = '';
            updateUI();
        }

        window.toggleTask = function(index) {
            tasks[index].completed = !tasks[index].completed;
            updateUI();
        }

        window.deleteTask = function(index) {
            tasks.splice(index, 1);
            updateUI();
        }

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
        themeToggle.addEventListener('click', () => { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; updateUI(); });
        langToggle.addEventListener('click', () => { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUI(); });

        updateUI();
    </script>
</body>
</html>
